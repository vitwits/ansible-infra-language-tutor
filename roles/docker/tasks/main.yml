---
- name: Install Docker and Docker Compose plugin
  apt:
    name:
      - docker.io
      - docker-compose-v2
    state: present

- name: Ensure Docker configuration directory exists
  file:
    path: /etc/docker
    state: directory
    mode: '0755'

- name: Configure Docker to allow insecure local registry
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "insecure-registries" : ["nexus.box.com:5000", "localhost:5000"]
      }
    mode: '0644'
  notify: Restart Docker

- name: Ensure docker.sock has correct permissions (fixes permission denied for Jenkins)
  file:
    path: /var/run/docker.sock
    mode: '0666'

- name: Ensure Docker is started and enabled
  service:
    name: docker
    state: started
    enabled: yes
