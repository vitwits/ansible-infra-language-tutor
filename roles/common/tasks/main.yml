---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: dist

- name: Install base packages
  apt:
    name:
      - curl
      - git
      - vim
      - nginx
      - unzip
    state: present

# --- BACKEND TOOLS CONFIGURATION (Python / Poetry / Pipx) ---

- name: Install Python3, venv, and pipx system-wide
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - pipx
    state: present

- name: Install Poetry into a shared system directory using native pipx CLI
  command: pipx install poetry
  environment:
    PIPX_HOME: /opt/pipx
    PIPX_BIN_DIR: /usr/local/bin
  args:
    creates: /usr/local/bin/poetry

- name: Configure Poetry to isolate virtualenvs inside the project backend directory
  command: /usr/local/bin/poetry config virtualenvs.in-project true
  changed_when: false

# --- FRONTEND TOOLS CONFIGURATION (Node.js / npm) ---

- name: Install Node.js and npm system-wide
  apt:
    name:
      - nodejs
      - npm
    state: present