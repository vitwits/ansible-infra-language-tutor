---
- name: Install Ansible on the server
  apt:
    name: ansible
    state: present
    update_cache: yes

- name: Allow jenkins user to run sudo commands without password
  copy:
    dest: /etc/sudoers.d/jenkins
    content: "jenkins ALL=(ALL) NOPASSWD:ALL"
    mode: '0440'
    validate: '/usr/sbin/visudo -cf %s'