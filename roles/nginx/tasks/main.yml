---
- name: Add local domains to /etc/hosts
  lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 jenkins.box.com nexus.box.com"
    state: present

- name: Deploy minimal Nginx config (only Jenkins)
  copy:
    dest: /etc/nginx/sites-available/box-services.conf
    content: |
      # Only Jenkins for now
      server {
          listen 80;
          server_name jenkins.box.com;

          location / {
              proxy_pass http://localhost:8080;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }
      }
  notify: Restart Nginx

- name: Enable Nginx configuration
  file:
    src: /etc/nginx/sites-available/box-services.conf
    dest: /etc/nginx/sites-enabled/box-services.conf
    state: link
  notify: Restart Nginx

- name: Remove default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart Nginx

- name: Restart Nginx
  service:
    name: nginx
    state: restarted