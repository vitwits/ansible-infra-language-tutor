---
- name: Install Base Dependencies for Jenkins (Java 21 & Fontconfig)
  apt:
    name:
      - fontconfig
      - openjdk-21-jre
    state: present
    update_cache: yes

- name: Ensure keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download official Jenkins 2026 GPG key
  get_url:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
    dest: /etc/apt/keyrings/jenkins-keyring.asc
    mode: '0644'

- name: Add Jenkins apt repository string (Modern DEB822 format)
  deb822_repository:
    name: jenkins
    types: deb
    uris: https://pkg.jenkins.io/debian-stable
    suites: binary/
    signed_by: /etc/apt/keyrings/jenkins-keyring.asc
    state: present

- name: Install Jenkins package from official repo
  apt:
    name: jenkins
    state: present
    update_cache: yes

- name: Ensure Jenkins service is started and enabled on boot
  service:
    name: jenkins
    state: started
    enabled: yes