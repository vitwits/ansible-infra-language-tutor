- hosts: servers
  become: true

  vars:
    new_user: ansible

  tasks:
    - name: Create ansible user
      user:
        name: "{{ new_user }}"
        shell: /bin/bash
        create_home: yes

    - name: Create .ssh directory
      file:
        path: "/home/{{ new_user }}/.ssh"
        state: directory
        owner: "{{ new_user }}"
        group: "{{ new_user }}"
        mode: '0700'

    - name: Copy SSH key from local machine
      authorized_key:
        user: "{{ new_user }}"
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

    - name: Allow passwordless sudo
      copy:
        dest: /etc/sudoers.d/{{ new_user }}
        content: "{{ new_user }} ALL=(ALL) NOPASSWD:ALL"
        mode: '0440'